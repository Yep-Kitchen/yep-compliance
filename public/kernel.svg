<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <!-- Main body: deep golden amber, lit from upper-left -->
    <radialGradient id="body" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="30%"  stop-color="#F5C030"/>
      <stop offset="65%"  stop-color="#D4920A"/>
      <stop offset="100%" stop-color="#9A5E08"/>
    </radialGradient>
    <!-- Secondary inner warm glow -->
    <radialGradient id="inner" cx="50%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#FFDA50" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFDA50" stop-opacity="0"/>
    </radialGradient>
    <!-- Gloss specular: bright white top-left -->
    <radialGradient id="gloss" cx="34%" cy="22%" r="38%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Rim light: subtle bright on right edge -->
    <radialGradient id="rim" cx="90%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#FFE88A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE88A" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-10%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Kernel body — organic rounded teardrop, slightly asymmetric -->
  <path d="
    M100 18
    C 82 18, 58 42, 52 75
    C 44 115, 48 158, 62 182
    C 72 200, 86 212, 100 212
    C 114 212, 128 200, 138 182
    C 152 158, 156 115, 148 75
    C 142 42, 118 18, 100 18 Z
  " fill="url(#body)" filter="url(#shadow)"/>

  <!-- Inner warm glow -->
  <path d="
    M100 18
    C 82 18, 58 42, 52 75
    C 44 115, 48 158, 62 182
    C 72 200, 86 212, 100 212
    C 114 212, 128 200, 138 182
    C 152 158, 156 115, 148 75
    C 142 42, 118 18, 100 18 Z
  " fill="url(#inner)"/>

  <!-- Central crease groove -->
  <path d="M100 24 C97 80 97 148 100 208"
    stroke="#7A4208" stroke-width="3.5" stroke-linecap="round"
    fill="none" opacity="0.45"/>

  <!-- Rim light on right -->
  <path d="
    M100 18
    C 82 18, 58 42, 52 75
    C 44 115, 48 158, 62 182
    C 72 200, 86 212, 100 212
    C 114 212, 128 200, 138 182
    C 152 158, 156 115, 148 75
    C 142 42, 118 18, 100 18 Z
  " fill="url(#rim)"/>

  <!-- Gloss specular highlight — upper-left -->
  <path d="
    M100 18
    C 82 18, 58 42, 52 75
    C 44 115, 48 158, 62 182
    C 72 200, 86 212, 100 212
    C 114 212, 128 200, 138 182
    C 152 158, 156 115, 148 75
    C 142 42, 118 18, 100 18 Z
  " fill="url(#gloss)"/>

  <!-- Small sharp specular dot — top-left bright spot -->
  <ellipse cx="72" cy="56" rx="14" ry="10"
    fill="white" opacity="0.55"
    transform="rotate(-25 72 56)"/>

  <!-- Germ tip at base -->
  <ellipse cx="100" cy="204" rx="10" ry="5"
    fill="#FFE8A0" opacity="0.5"/>
</svg>
